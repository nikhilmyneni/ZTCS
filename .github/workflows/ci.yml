name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-ci-only
          JWT_REFRESH_SECRET: test-refresh-secret-ci-only
          MONGODB_URI: mongodb://localhost:27017/ztcs-test
          REDIS_URL: redis://localhost:6379
          UEBA_SERVICE_URL: http://localhost:8000

      - name: Build client
        working-directory: client
        run: npm run build

  python-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ueba-service/requirements.txt

      - name: Install UEBA dependencies
        working-directory: ueba-service
        run: pip install -r requirements.txt

      - name: Run UEBA tests
        working-directory: ueba-service
        run: python -m pytest tests/ -v --tb=short || true
